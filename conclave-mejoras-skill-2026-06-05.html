        o = o || {}; const wrap = el("div", "entry redteam step"); const card = el("div", "card");
        const head = el("div", "head"); head.appendChild(svgBox(starGlyph("var(--ox)"), "mini")); head.appendChild(el("span", "who", L.redteam));
        const tags = el("div", "tags"); if (o.severity) tags.appendChild(el("span", "badge " + (SEV[o.severity] || "b-warn"), L.severity + " " + ((L.sev && L.sev[o.severity]) || o.severity))); if (o.unanswered) tags.appendChild(el("span", "badge b-bad", L.unanswered)); head.appendChild(tags); card.appendChild(head);
        if (o.strongest_objection) card.appendChild(rich("div", "obj", o.strongest_objection));
        const det = []; if (o.target_position) det.push(el("div", "tgt", L.targets + " " + o.target_position)); if (o.failure_mode) det.push(rich("div", "fm", L.failmode + " " + o.failure_mode));
        addDetail(wrap, card, det); wrap.appendChild(card); return wrap;
      }

      function medEntry(o, round) {
        o = o || {}; const wrap = el("div", "entry mediator step"); const card = el("div", "card");
        const head = el("div", "head"); head.appendChild(svgBox(starGlyph("var(--gold)"), "mini")); head.appendChild(el("span", "who", L.moderator));
        const tags = el("div", "tags"); const si = stat(o.status); tags.appendChild(el("span", "badge " + si.cls, si.txt));
        if (o.redteam_addressed === true) tags.appendChild(el("span", "tag", "🜂 " + L.addressed)); if (o.redteam_addressed === false) tags.appendChild(el("span", "tag", "🜂 " + L.pending)); head.appendChild(tags); card.appendChild(head);
        card.appendChild(el("div", "lab2", L.ruling2));
        if (o.consensus_reached && o.consensus_statement) card.appendChild(rich("div", "stance", o.consensus_statement));
        else if (o.guidance_next_round) { card.appendChild(el("div", "lab2", L.guidance)); card.appendChild(rich("div", "reason", o.guidance_next_round)); }
        const det = [];
        if (o.confidence_note) { const w = el("div"); w.appendChild(el("div", "lab2", L.confread)); w.appendChild(rich("div", "reason", o.confidence_note)); det.push(w); }
        if (Array.isArray(o.open_cruxes) && o.open_cruxes.length) { const w = el("div"); w.appendChild(el("div", "lab2", L.cruxesOpen)); const ul = el("ul", "cruxlist"); o.open_cruxes.forEach((c) => ul.appendChild(el("li", null, c.issue || ""))); w.appendChild(ul); det.push(w); }
        addDetail(wrap, card, det); wrap.appendChild(card); return wrap;
      }

      function ratifyEntry(rat) {
        const wrap = el("div", "entry ratify step"); const card = el("div", "card");
        const head = el("div", "head"); head.appendChild(el("span", "who", "🗳 " + L.ratification)); head.appendChild(el("span", "tag", L.round.toLowerCase() + " " + (rat.round ?? "?"))); card.appendChild(head);
        if (rat.statement) { const s = el("div", "stmt2"); s.append("“" + rat.statement + "”"); card.appendChild(s); }
        const votes = el("div", "votes");
        (rat.votes || []).forEach((v) => { const o = v.output || {}; const row = el("div", "vote " + (o.ratifies ? "y" : "n")); row.appendChild(el("span", "mk", o.ratifies ? "✓" : "✗")); const tx = el("span"); tx.appendChild(el("b", null, v.name)); tx.append(o.ratifies ? " " + L.ratifies : (o.objection ? " — " + o.objection : " " + L.objects)); row.appendChild(tx); votes.appendChild(row); });
        card.appendChild(votes); wrap.appendChild(card); return wrap;
      }

      function buildVerdict(d) {
        const v = el("div", "verdict step anim"); const frame = el("div", "frame"); const si = stat(d.status);
        const seal = el("div", "seal seal-disc"); seal.style.setProperty("--sc", si.seal); seal.innerHTML = starGlyph("rgba(0,0,0,.55)"); frame.appendChild(seal);
        frame.appendChild(el("div", "vk", d.consensus_ratified ? L.rulingRat : L.ruling));
        frame.appendChild(el("h2", null, si.txt));
        frame.appendChild(rich("div", "statement", d.verdict || (d.rationale ? d.rationale : "—")));
        const grid = el("div", "grid");
        const col = (title, items, cls) => { if (!Array.isArray(items) || !items.length) return null; const c = el("div", "col " + (cls || "")); c.appendChild(el("h3", null, title)); const ul = el("ul"); items.forEach((it) => ul.appendChild(el("li", null, it))); c.appendChild(ul); return c; };
        [col(L.agreements, d.agreements), col(L.cruxes, (d.cruxes || []).map((c) => c.issue || "")), col(L.dissent, (d.dissent || []).map((x) => (x.model ? x.model + ": " : "") + (x.view || "") + (x.why ? " — " + x.why : "")), "dis")].forEach((c) => c && grid.appendChild(c));
        if (grid.children.length) frame.appendChild(grid);
        if (d.confidence_note) frame.appendChild(rich("div", "note", L.confidence + " · " + d.confidence_note));
        if (d.rationale && d.verdict) frame.appendChild(rich("div", "note", L.reasoning + " · " + d.rationale));
        if (d.verdict_audit) {
          const a = d.verdict_audit, ap = el("div", "audit");
          const rb = a.robustness === "alta" ? "b-good" : a.robustness === "baja" ? "b-bad" : "b-warn";
          const h = el("div", "audit-h"); h.appendChild(el("span", "lab2", "🔎 " + L.audit)); h.appendChild(el("span", "badge " + rb, L.robustnessLbl + " " + a.robustness)); ap.appendChild(h);
          const flags = el("div", "audit-flags");
          const flag = (on, txt) => { const s = el("span", "aflag " + (on ? "on" : "off")); s.textContent = (on ? "⚠ " : "✓ ") + txt; flags.appendChild(s); };
          flag(a.relies_on_unverified, L.auditUnverified); flag(a.unaddressed_redteam, L.auditRedteam); flag(a.overconfidence_or_herding, L.auditHerding);
          ap.appendChild(flags);
          if (a.audit_note) ap.appendChild(rich("div", "note", a.audit_note));
          frame.appendChild(ap);
        }
        v.appendChild(frame); return v;
      }

      function setCursor(n) {
        cursor = Math.max(0, Math.min(STEPS.length, n));
        STEPS.forEach((s, i) => { s.classList.toggle("veiled", i >= cursor); s.classList.toggle("cursor", i === cursor - 1 && cursor < STEPS.length); });
        const seek = document.getElementById("seek"), count = document.getElementById("count");
        if (seek) { seek.value = String(cursor); seek.style.setProperty("--fill", (STEPS.length ? (cursor / STEPS.length) * 100 : 100) + "%"); }
        if (count) count.textContent = cursor + " / " + STEPS.length;
      }
      let playing = false, timer = null;
      function togglePlay() { playing ? pause() : play(); }
      function play() { playing = true; document.getElementById("play").textContent = L.pause; if (cursor >= STEPS.length) setCursor(0); const tick = () => { if (!playing) return; if (cursor >= STEPS.length) { pause(); return; } setCursor(cursor + 1); const cur = STEPS[cursor - 1]; if (cur) cur.scrollIntoView({ block: "center" }); timer = setTimeout(tick, 900); }; tick(); }
      function pause() { playing = false; if (timer) clearTimeout(timer); const p = document.getElementById("play"); if (p) p.textContent = L.play; }

      function toggleFocus(idx, card) {
        if (focusIdx === idx) { focusIdx = null; document.body.classList.remove("has-focus"); document.querySelectorAll(".member.sel").forEach((m) => m.classList.remove("sel")); return; }
        focusIdx = idx; document.body.classList.add("has-focus"); document.querySelectorAll(".member").forEach((m) => m.classList.toggle("sel", m === card));
        document.querySelectorAll(".entry").forEach((en) => en.classList.toggle("is-focus", en.classList.contains("stmt") && en.dataset.idx === String(idx)));
        const first = document.querySelector('.entry.stmt[data-idx="' + idx + '"]'); if (first) first.scrollIntoView({ block: "center" });
      }
      function cycleEvidence() {
        evCycle = (evCycle + 1) % EVS.length; document.body.classList.remove("ev-hecho", "ev-inferencia", "ev-especulación"); const btn = document.getElementById("evbtn");
        if (EVS[evCycle]) { document.body.classList.add("ev-" + EVS[evCycle]); btn.classList.add("is-on"); btn.textContent = "◉ " + evText(EVS[evCycle]); } else { btn.classList.remove("is-on"); btn.textContent = L.evidence; }
      }
      function toggleAll() {
        allOpen = !allOpen; const btn = document.getElementById("expbtn"); btn.textContent = allOpen ? L.collapseAll : L.expandAll; btn.classList.toggle("is-on", allOpen);
        document.querySelectorAll(".entry").forEach((en) => { const has = en.querySelector(".morebtn"); if (!has) return; en.classList.toggle("open", allOpen); has.textContent = allOpen ? L.less : L.more; });
      }
      function toggleReveal() {
        const on = document.body.classList.toggle("unmasked"); const btn = document.getElementById("revbtn"); btn.classList.toggle("is-on", on); btn.textContent = on ? L.mask : L.unmask;
        if (on) { document.querySelectorAll(".member").forEach((m, i) => { m.classList.add("pulse"); setTimeout(() => m.classList.remove("pulse"), 1200 + i * 80); }); toast(L.veil + (window.__rm || (LANG === "es" ? "el mismo modelo" : "the same model"))); }
      }
      function toggleHelp() {
        let ov = document.getElementById("help-ov");
        if (!ov) {
          ov = el("div", "help-ov"); ov.id = "help-ov";
          const box = el("div", "help-box"); box.appendChild(el("h3", null, L.helpTitle));
          const grid = el("div", "help-grid");
          (L.keys || []).forEach(([k, v]) => { grid.appendChild(el("kbd", null, k)); grid.appendChild(el("span", null, v)); });
          box.appendChild(grid);
          const cl = el("button", "ctrl", "✕"); cl.onclick = toggleHelp; box.appendChild(cl);
          ov.appendChild(box); ov.onclick = (e) => { if (e.target === ov) toggleHelp(); };
          document.body.appendChild(ov);
        }
        ov.classList.toggle("show");
      }
      function copyVerdict(d) {
        const si = stat(d.status), out = [];
        out.push("# " + L.title + " — " + si.txt);
        if (d.question) out.push("\n> " + d.question);
        out.push("\n**" + L.verdict + ":** " + String(d.verdict || d.rationale || "—"));
        if (Array.isArray(d.agreements) && d.agreements.length) { out.push("\n## " + L.agreements); d.agreements.forEach((a) => out.push("- " + a)); }
        if (Array.isArray(d.cruxes) && d.cruxes.length) { out.push("\n## " + L.cruxes); d.cruxes.forEach((c) => out.push("- " + (c && c.issue ? c.issue : c))); }
        if (Array.isArray(d.dissent) && d.dissent.length) { out.push("\n## " + L.dissent); d.dissent.forEach((x) => out.push("- " + (x.model ? "**" + x.model + ":** " : "") + (x.view || "") + (x.why ? " — " + x.why : ""))); }
        if (d.verdict_audit) { const a = d.verdict_audit; out.push("\n## " + L.audit + " (" + L.robustnessLbl + ": " + a.robustness + ")"); if (a.audit_note) out.push(a.audit_note); }
        out.push("\n— " + (d.realModel || "") + " · " + (d.rounds_used ?? "?") + " " + L.rounds + " · " + (d.agents ?? "?") + " " + L.voices);
        const md = out.join("\n"), done = () => toast(L.copied);
        if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(md).then(done, done);
        else { const ta = el("textarea"); ta.value = md; ta.style.position = "fixed"; ta.style.opacity = "0"; document.body.appendChild(ta); ta.select(); try { document.execCommand("copy"); } catch (e) {} ta.remove(); done(); }
      }
      function wireKeys() {
        document.addEventListener("keydown", (e) => {
          if (e.target && /input|textarea/i.test(e.target.tagName)) return;
          if (e.key === " ") { e.preventDefault(); togglePlay(); }
          else if (e.key === "ArrowRight") { pause(); setCursor(cursor + 1); }
          else if (e.key === "ArrowLeft") { pause(); setCursor(cursor - 1); }
          else if (e.key.toLowerCase() === "r") toggleReveal();
          else if (e.key.toLowerCase() === "e") cycleEvidence();
          else if (e.key.toLowerCase() === "a") toggleAll();
          else if (e.key === "?") toggleHelp();
        });
      }

      if (typeof DATA === "string") {
        app.appendChild(el("div", "placeholder", L.noData));
      } else {
        try { window.__rm = DATA.realModel || ""; render(DATA); }
        catch (err) { app.appendChild(el("div", "placeholder", L.err + (err && err.message))); }
      }
    </script>
  </body>
</html>
